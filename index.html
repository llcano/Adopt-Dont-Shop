<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Photo Gallery</title>
    <link rel="stylesheet" href="css/gallery.css">
    <script src="js/gallery.js"></script>
</head>
<body>
    <h1>Interactive Photo Gallery</h1>

    <div id="image">
        Hover over an image below to display here.
    </div>

    <img class="preview" alt="Meldy" src="https://paws.org.ph/wp-content/uploads/2023/05/IMG_20220912_140255-scaled-e1684380671655.jpg" onmouseover="upDate(this)" onmouseleave="unDo()" onfocus="onFocus(this)" onblur="onBlur()">
    
    <img class="preview" alt="Mateo" src="https://paws.org.ph/wp-content/uploads/2024/12/Adopt-Mateo.jpg" onmouseover="upDate(this)" onmouseleave="unDo()" onfocus="onFocus(this)" onblur="onBlur()">

    <img class="preview" alt="Blessing" src="https://paws.org.ph/wp-content/uploads/2023/05/Adopt-Blessing.jpg" onmouseover="upDate(this)" onmouseleave="unDo()" onfocus="onFocus(this)" onblur="onBlur()">
      
    <img class="preview" alt="Cornelia" src="https://paws.org.ph/wp-content/uploads/2022/12/Cornelia-Before.jpg" onmouseover="upDate(this)" onmouseleave="unDo()" onfocus="onFocus(this)" onblur="onBlur()">
                            
    <img class="preview" alt="Marie" src="https://paws.org.ph/wp-content/uploads/2025/10/Marie-1-scaled-e1760076483794.jpeg" onmouseover="upDate(this)" onmouseleave="unDo()" onfocus="onFocus(this)" onblur="onBlur()">

    <img class="preview" alt="Tiktok" src="https://paws.org.ph/wp-content/uploads/2023/08/PAWS-9841-e1692255960472.jpg" onmouseover="upDate(this)" onmouseleave="unDo()" onfocus="onFocus(this)" onblur="onBlur()">
</body>
</html>
